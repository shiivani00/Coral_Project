<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <title>Coral Reefs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Coral Reefs</h1>
    <p class="subtitle">Click on the corals to learn about the coral reefs!</p>

    <div class="coral-row">

        <div class="coral" data-reef="gbr">
            <img src="Images/GBR/Greatbarrierreef_Home.png" alt="Great Barrier Reef">
            <span class="label">Great Barrier Reef</span>
        </div>

        <div class="coral" data-reef="rs">
            <img src="Images/RS/Redseacoralreef_Home.png" alt="Red Sea Reef">
            <span class="label">Red Sea Reef</span>
        </div>

        <div class="coral" data-reef="ct">
            <img src="Images/CT/Coraltriangle_Home.png" alt="Coral Triangle">
            <span class="label">Coral Triangle</span>
        </div>

        <div class="coral" data-reef="hc">
            <img src="Images/HC/Hawaiiancoralreef_Home.png" alt="Hawaiian Reef">
            <span class="label">Hawaiian Reef</span>
        </div>

        <div class="coral" data-reef="cr">
            <img src="Images/CCR/Caribbeancoralreef_Home.png" alt="Caribbean Reef">
            <span class="label">Caribbean Reef</span>
        </div>

        <div class="coral" data-reef="mc">
            <img src="Images/MC/Maldivescoralreef_Home.png" alt="Maldives Reef">
            <span class="label">Maldives Reef</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
