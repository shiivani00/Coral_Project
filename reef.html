<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reef Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="reef-container">
    <div class="reef-panel">

        <div class="top-bar">

            <button class="back-btn" onclick="goBack()">&#60;</button>

            <div class="reef-title-box">
                <h1 id="reef-page-title">The Great Barrier Reef</h1>
            </div>

            <div class="year-section">
                <div class="year-line"></div>

                <div class="year-buttons">
                    <button onclick="changeYear(2006)">2006</button>
                    <button onclick="changeYear(2026)">2026</button>
                    <button onclick="changeYear(2046)">2046</button>
                </div>
            </div>
        </div>

        <div class="center-content">
            <h2 id="coral-name">Acropora millepora</h2>

            <div class="text-box">
                <p id="text-blue">Blue text goes here</p>
                <p id="text-green">Green text goes here</p>
            </div>

            <div class="status-box">
                <p id="status-title"><strong>Status: Critical</strong></p>
                <p id="status-text">Status text will change based on year</p>
            </div>
        </div>

        <div class="coral-display">

            <div class="coral-label-card" id="coral-label-card">
                <span id="coral-label-text">Acropora millepora</span>
            </div>

            <div class="coral coral1"></div>
            <div class="coral coral2"></div>
            <div class="coral coral3"></div>
            <div class="coral coral4"></div>
            <div class="coral coral5"></div>
            <div class="coral coral6"></div>
        </div>

        <div class="bottom-info">
            <div class="bottom-line"></div>
            <p id="reef-info">The reef information goes here.</p>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>

</body>
</html>
